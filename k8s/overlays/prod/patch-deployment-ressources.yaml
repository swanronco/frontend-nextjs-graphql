apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-nextjs-graphql
  namespace: frontend
spec:
  template:
    spec:
      containers:
        - name: frontend-nextjs-graphql
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
