apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-nextjs-graphql
  namespace: frontend
# Le frontend ne communique pas avec l'API Kubernetes (il appelle le backend en HTTP/GraphQL).
# On désactive donc l'injection automatique du token du ServiceAccount dans les pods,
# pour des raisons de sécurité : pas de token d'accès au cluster monté dans le conteneur
# = surface d'attaque réduite. À repasser à true le jour où l'app devra appeler l'API K8s.
automountServiceAccountToken: false
